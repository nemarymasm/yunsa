<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>플라톤 정복</title>
<style>
  :root{
    --bg:#0e1116; --panel:#171c26; --panel2:#1d2430; --line:#2a3340;
    --txt:#eef2f8; --mut:#93a1b4; --gold:#ffcf52; --blue:#62a9ff;
    --o:#46d493; --x:#ff6b6b; --oBg:rgba(70,212,147,.16); --xBg:rgba(255,107,107,.15);
    --safe: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  html{background:#080b10}
  body{
    background:var(--bg);color:var(--txt);
    font-family:"Pretendard","Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;
    line-height:1.65;overscroll-behavior:none;
    display:flex;flex-direction:column;height:100dvh;
    max-width:480px;margin-inline:auto;box-shadow:0 0 0 1px var(--line), 0 0 60px rgba(0,0,0,.55);
  }
  button{font-family:inherit;touch-action:manipulation;user-select:none;cursor:pointer}

  /* ===== top bar ===== */
  .top{flex:0 0 auto;padding:10px 14px 8px;border-bottom:1px solid var(--line);background:var(--bg)}
  .toprow{display:flex;align-items:center;gap:8px}
  .title{font-size:15px;font-weight:800;white-space:nowrap}
  .title small{color:var(--mut);font-weight:600;font-size:11px}
  .spacer{flex:1}
  .bmpill{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:20px;padding:5px 11px;font-size:12px;font-weight:800}
  .bmpill.on{background:var(--gold);color:#000;border-color:var(--gold)}
  .toggle{display:flex;border:1px solid var(--line);border-radius:20px;overflow:hidden;font-size:11.5px;font-weight:800}
  .toggle button{background:transparent;color:var(--mut);border:none;padding:5px 10px}
  .toggle button.on{background:var(--blue);color:#001}
  .nav{display:flex;gap:6px;margin-top:9px}
  .nav button{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:7px;font-size:12px;font-weight:700}
  .nav button.active{background:var(--panel2);color:var(--txt);border-color:#3a4658}
  .bar{height:6px;background:var(--panel2);border-radius:6px;overflow:hidden;margin-top:9px}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--o),var(--gold));transition:width .35s}
  .pstat{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-top:5px}

  /* ===== pages ===== */
  .page{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
  .page.active{display:block}
  #loop{display:flex;flex-direction:column}

  /* ===== quiz zone ===== */
  .qzone{flex:1 1 auto;padding:16px 18px 8px;display:flex;flex-direction:column}
  .meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--mut);margin-bottom:8px}
  .pill{border:1px solid var(--line);border-radius:20px;padding:2px 10px}
  .pill.hard{color:#000;background:var(--gold);border-color:var(--gold);font-weight:800}
  .starbtn{margin-left:auto;background:transparent;border:none;font-size:26px;line-height:1;color:#54627a;padding:2px 4px}
  .starbtn.on{color:var(--gold)}
  .navbtn{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:8px;font-size:14px;line-height:1;padding:4px 9px;font-weight:800}
  .navbtn:disabled{cursor:default}
  .ask{font-size:13px;color:var(--mut);margin:2px 0 2px}
  .ask b{color:var(--txt)}
  .stem{font-size:21px;font-weight:600;letter-spacing:-.2px;word-break:keep-all;margin:6px 0 4px}

  .fb{margin-top:16px;border-radius:14px;padding:15px 16px;display:none;animation:rise .22s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .fb.show{display:block}
  .fb.ok{background:var(--oBg);border:1px solid var(--o)}
  .fb.no{background:var(--xBg);border:1px solid var(--x)}
  .fb.dunno{background:#1b2436;border:1px solid #3a4a66}
  .fbResult{font-weight:800;font-size:19px;margin-bottom:10px}
  .fbResult.ok{color:var(--o)} .fbResult.no{color:var(--x)} .fbResult.dn{color:var(--blue)}
  .fbCompare{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .cmp{font-size:13px;font-weight:700;border-radius:8px;padding:4px 10px;border:1px solid var(--line)}
  .cmp.good{background:var(--oBg);color:var(--o);border-color:var(--o)}
  .cmp.bad{background:var(--xBg);color:var(--x);border-color:var(--x);text-decoration:line-through}
  .cmp.ans{background:#222a36;color:var(--gold);border-color:#3a4658}
  .fbConcl{font-size:15px;font-weight:700;margin-bottom:10px}
  .axline{font-size:12px;color:var(--blue);font-weight:800;margin-bottom:6px}
  .why{font-size:15px}
  .form{font-size:12.5px;color:var(--gold);margin-top:8px}
  .canon{font-size:12.5px;color:var(--mut);margin-top:8px;border-top:1px dashed var(--line);padding-top:8px}
  .ctx{font-size:12.5px;color:var(--gold);background:rgba(255,207,82,.08);border:1px solid #3a3320;border-radius:9px;padding:7px 11px;margin:2px 0 8px;word-break:keep-all}
  .fbSrc{font-size:12px;color:#6b7686;margin-top:8px}

  /* ===== bottom dock ===== */
  .dock{flex:0 0 auto;padding:10px 14px calc(12px + var(--safe));border-top:1px solid var(--line);background:var(--bg)}
  .choices{display:flex;flex-direction:column;gap:10px}
  .crow{display:flex;gap:10px}
  .crow button{flex:1;border-radius:15px;border:2px solid var(--line);background:var(--panel2);color:var(--txt);font-weight:800}
  .crow.main button{height:60px;font-size:20px}
  .crow.sub button{height:46px;font-size:15px;font-weight:700;color:var(--mut);border-width:1px}
  .crow button.O{border-color:rgba(70,212,147,.5)} .crow button.O:active{background:var(--oBg)}
  .crow button.X{border-color:rgba(255,107,107,.5)} .crow button.X:active{background:var(--xBg)}
  .crow button.dunno:active{background:#23304a}
  .crow button.flag{color:#e7a14a} .crow button.flag:active{background:#3a2a16}
  .nextRow{display:none;gap:10px}
  .nextRow .star{flex:0 0 64px;height:62px;border-radius:16px;border:1px solid var(--line);background:var(--panel2);font-size:24px;color:#54627a}
  .nextRow .star.on{color:var(--gold);border-color:var(--gold)}
  .nextRow .next{flex:1;height:62px;border-radius:16px;border:none;background:var(--gold);color:#000;font-size:18px;font-weight:800}
  .dock.answered .choices{display:none}
  .keyhint{text-align:center;font-size:10.5px;color:#566172;margin-top:9px;letter-spacing:-.2px}
  /* annotation */
  .anno{background:rgba(255,207,82,.26);border-bottom:2px solid var(--gold);border-radius:2px;cursor:pointer;padding:0 1px}
  .anno::after{content:attr(data-n);font-size:.6em;vertical-align:super;color:var(--gold);font-weight:800;margin-left:1px}
  .addnote{position:fixed;z-index:35;background:var(--gold);color:#000;font-weight:800;font-size:12.5px;border:none;border-radius:9px;padding:7px 12px;box-shadow:0 4px 14px rgba(0,0,0,.55);display:none}
  .notes{margin-top:14px;display:flex;flex-direction:column;gap:7px}
  .noteshd{font-size:12px;color:var(--mut);font-weight:700}
  .note{display:grid;grid-template-columns:auto 1fr auto;column-gap:7px;row-gap:3px;align-items:start;font-size:12.5px;border-left:3px solid var(--gold);background:rgba(255,207,82,.07);border-radius:0 9px 9px 0;padding:8px 10px;word-break:keep-all}
  .note .nn{color:var(--gold);font-weight:800}
  .note .q{color:var(--txt)}
  .note .del{background:transparent;border:none;color:var(--x);font-size:14px;font-weight:800;line-height:1;padding:0 2px;cursor:pointer;align-self:start}
  .note .selq{grid-column:1 / -1;color:var(--mut);font-size:11px;margin-top:2px}
  .note.flash{outline:2px solid var(--gold)}
  .annopill{border-color:#5a4c24 !important;color:var(--gold) !important}
  .dock.answered .nextRow{display:flex}

  /* ===== done ===== */
  .done{display:none;text-align:center;padding:46px 20px;margin:auto}
  .done.show{display:block}
  .done .big{font-size:54px}
  .done h2{margin:8px 0 4px;font-size:20px}
  .done p{color:var(--mut);font-size:13px}
  .done button{margin-top:18px;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:11px 18px;font-size:14px;font-weight:700}

  /* ===== matrix / equiv ===== */
  .inner{padding:16px 16px 40px}
  .note{font-size:12.5px;color:var(--mut);background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:14px}
  .note b{color:var(--gold)}
  .axcard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:11px}
  .axcard h3{margin:0 0 3px;font-size:15px}
  .axcard .code{color:var(--blue);font-weight:800;margin-right:6px}
  .axcard .canon{font-size:12.5px;color:var(--gold);margin:3px 0 9px}
  .axcard .cnt{float:right;font-size:11px;color:var(--mut);font-weight:600}
  .sel{font-size:13px;border-left:3px solid var(--line);padding:5px 0 5px 9px;margin:5px 0;word-break:keep-all}
  .sel .b{display:inline-block;width:17px;height:17px;line-height:17px;text-align:center;border-radius:5px;font-weight:800;font-size:11px;margin-right:6px}
  .sel.o{border-color:var(--o)} .sel.o .b{background:var(--oBg);color:var(--o)}
  .sel.x{border-color:var(--x)} .sel.x .b{background:var(--xBg);color:var(--x)}
  .sel .id{color:#5b6878;font-size:10.5px;margin-left:5px}
  .eq{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:11px}
  .eq .src{font-size:11.5px;color:var(--mut)}
  .eq .orig{font-weight:700;margin:4px 0 9px;word-break:keep-all}
  .eq .row{font-size:13px;padding:7px 10px;border-radius:9px;margin:5px 0;background:var(--panel2);word-break:keep-all}
  .eq .row.warn{border:1px dashed var(--x)}
  .eq .tag{font-size:10.5px;font-weight:800;border-radius:5px;padding:1px 7px;margin-right:7px}
  .eq .tO{background:var(--oBg);color:var(--o)} .eq .tX{background:var(--xBg);color:var(--x)}

  .toast{position:fixed;left:50%;bottom:calc(96px + var(--safe));transform:translateX(-50%);background:var(--o);color:#04130c;font-weight:800;padding:9px 18px;border-radius:30px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:30;white-space:nowrap;max-width:90vw}
  .toast.show{opacity:1}
  .objpill{background:transparent;border:1px solid #5a4324;color:#e7a14a;border-radius:20px;padding:5px 10px;font-size:12px;font-weight:800}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;z-index:40}
  .overlay.show{display:flex}
  .sheet{background:var(--panel);width:100%;max-width:480px;max-height:82dvh;border-radius:18px 18px 0 0;padding:16px 16px calc(16px + var(--safe));display:flex;flex-direction:column}
  .sheetH{font-weight:800;font-size:16px;margin-bottom:10px}
  .objList{overflow-y:auto;flex:1}
  .objitem{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px}
  .oi-id{font-size:11px;color:var(--mut)}
  .oi-tx{font-size:13px;margin:3px 0;word-break:keep-all}
  .oi-note{font-size:13px;color:#e7a14a}
  .sheetB{display:flex;gap:8px;margin-top:10px}
  .sheetB button{flex:1;padding:11px;border-radius:11px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:13px;font-weight:700}
  .sheetB button.prim{background:var(--gold);color:#000;border:none}
</style>
</head>
<body>

  <!-- TOP -->
  <div class="top">
    <div class="toprow">
      <div class="title">🏛️ 플라톤</div>
      <div class="spacer"></div>
      <button class="objpill" id="objpill" style="display:none" onclick="showObjections()">⚑ <span id="objCount">0</span></button>
      <button class="objpill annopill" id="annopill" style="display:none" onclick="showAnnos()">📝 <span id="annoCount">0</span></button>
      <button class="bmpill" id="bmpill" onclick="toggleBookmarkMode()">⭐ <span id="bmCount">0</span></button>
      <div class="toggle" id="orderToggle">
        <button data-o="shuffle" class="on">🔀</button>
        <button data-o="year">📅</button>
      </div>
      <div class="toggle" id="diffToggle">
        <button data-d="basic" class="on">기본</button>
        <button data-d="hard">도전</button>
      </div>
    </div>
    <div class="nav">
      <button class="active" data-p="loop">시험</button>
      <button data-p="matrix">쟁점</button>
      <button data-p="equiv">동치</button>
    </div>
    <div class="bar"><i id="pbar"></i></div>
    <div class="pstat"><span id="pleft">—</span><span id="pmastered">—</span></div>
  </div>

  <!-- LOOP -->
  <div class="page active" id="loop">
    <div class="qzone" id="qzone">
      <div class="meta">
        <button class="navbtn" id="prevBtn" onclick="prev()" title="이전 문제">◀</button>
        <span class="pill" id="qid">—</span>
        <span class="pill hard" id="qsym" style="display:none"></span>
        <span id="qflag" style="display:none;color:#e7a14a;font-size:12px;font-weight:800">⚑ 이의됨</span>
        <button class="starbtn" id="starbtn" onclick="toggleStar()" title="다시 풀 문제 보관">☆</button>
        <button class="navbtn" id="nextBtn" onclick="goNext()" title="다음 문제">▶</button>
      </div>
      <div class="ctx" id="qctx" style="display:none"></div>
      <div class="ask" id="qask">이 선지는 <b>플라톤</b>의 입장으로 옳은가?</div>
      <div class="stem" id="qstem" data-region="stem">로딩 중…</div>
      <div class="notes" id="notes" style="display:none"></div>
      <div class="fb" id="fb">
        <div class="fbResult" id="fbResult"></div>
        <div class="fbCompare" id="fbCompare"></div>
        <div class="fbConcl" id="fbConcl"></div>
        <div class="axline" id="fbAx"></div>
        <div class="why" id="fbWhy" data-region="why"></div>
        <div class="form" id="fbForm"></div>
        <div class="canon" id="fbCanon" data-region="canon"></div>
        <div class="fbSrc" id="fbSrc" style="display:none"></div>
      </div>
    </div>

    <div class="done" id="done">
      <div class="big">🏛️✨</div>
      <h2 id="doneTitle">전부 정복!</h2>
      <p id="doneSub"></p>
      <button onclick="restart()">처음부터 다시</button>
    </div>

    <div class="dock" id="dock">
      <div class="choices">
        <div class="crow main">
          <button class="O" onclick="answer('O')">○ 옳다</button>
          <button class="X" onclick="answer('X')">✕ 아니다</button>
        </div>
        <div class="crow sub">
          <button class="dunno" onclick="dunno()">🤔 모르겠다</button>
          <button class="flag" onclick="objectQ()">⚑ 이의있다</button>
        </div>
      </div>
      <div class="nextRow">
        <button class="star" id="dockStar" onclick="toggleStar()">☆</button>
        <button class="next" onclick="nextCard()">다음 →</button>
      </div>
      <div class="keyhint">⌨/리모컨 &nbsp;←○ →✕ &nbsp;·&nbsp; ↑이전 ↓다음 &nbsp;·&nbsp; Enter=다음 &nbsp; (d=모름)</div>
    </div>
  </div>

  <!-- MATRIX -->
  <div class="page" id="matrix"><div class="inner">
    <div class="note">이 <b>쟁점 매트릭스</b>가 정답 판정의 기준(진실 원천)이야. 각 축의 "플라톤 정설"에 비추어 선지의 정오가 갈려.</div>
    <div id="axlist"></div>
  </div></div>

  <!-- EQUIV -->
  <div class="page" id="equiv"><div class="inner">
    <div class="note"><b>도전 모드</b>를 켜면 같은 명제를 <b>진리값을 보존한 채 더 어렵게</b> 비튼 선지(대우·이중부정·양화 동치)가 섞여 나와. <b style="color:var(--x)">거짓동치</b>(의미가 바뀐 것)는 섞지 않음.</div>
    <div id="eqlist"></div>
  </div></div>

  <button class="addnote" id="addnote" onmousedown="event.preventDefault()" onclick="addNote()">＋ 질문·메모</button>

  <div class="overlay" id="annoOverlay">
    <div class="sheet">
      <div class="sheetH">📝 내 메모·질문 (<span id="annoN">0</span>)</div>
      <div class="objList" id="annoList"></div>
      <div class="sheetB">
        <button onclick="copyAnnos()">전체 복사</button>
        <button class="prim" onclick="hideAnnos()">닫기</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="objOverlay">
    <div class="sheet">
      <div class="sheetH">⚑ 이의 목록 (<span id="objN">0</span>)</div>
      <div class="objList" id="objList"></div>
      <div class="sheetB">
        <button onclick="copyObjections()">전체 복사</button>
        <button onclick="clearObjections()">전체 삭제</button>
        <button class="prim" onclick="hideObjections()">닫기</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
/* ===== 쟁점 매트릭스 ===== */
const AX = {
  J1:{name:"정의=직분 충실", canon:"정의란 각 계층이 '자기 직분(제 일)'에 충실한 것. 역할 교환은 오히려 부정의."},
  J2:{name:"절제=세 계층 공통덕", canon:"절제는 세 계층 모두에게 요구되는 공통의 덕. 이성이 욕망을 다스릴 때 갖춰짐."},
  J3:{name:"지혜=통치자 고유덕", canon:"지혜는 통치자(이성)에게 고유한 덕. 모든 계층에 요구되는 게 아니다."},
  J4:{name:"용기=기개의 덕", canon:"용기는 기개의 덕. 기개가 '이성의 명령을 따라' 두려운 것과 아닌 것을 분별할 때 발휘(기개가 영혼을 지배하는 게 아님)."},
  J5:{name:"국가-영혼 유비", canon:"국가(3계층)와 개인 영혼(3부분)은 구조적으로 유사. 큰 글자(국가)로 작은 글자(개인)를 읽는다."},
  J6:{name:"통치자=선의 이데아 인식한 철인", canon:"통치자는 선의 이데아를 인식한 철학자이며 지혜를 갖춤. 나아가 절제·용기까지 갖춘 자."},
  J7:{name:"통치자 선발=소질+교육", canon:"통치자는 타고난 소질을 갖춘 자를 선발해 장기 교육으로 양성. 누구나 되는 게 아니다."},
  J8:{name:"정치체제=철인 통치", canon:"통치는 지혜를 갖춘 철인이 맡아야. 시민 직접참여나 '아무나 통치'는 부정."},
  J9:{name:"사유재산=수호자✗ 생산자✓", canon:"수호자·통치자 계급은 사유재산 금지(공유). 생산자 계층은 사유재산 허용."},
  J10:{name:"이데아론=이성·초월", canon:"이데아는 초월적이며 이성으로만 파악. 감각으로는 가변 현상만, 이데아가 사물 안에 내재하지 않음."},
  J11:{name:"덕=행복 일치", canon:"덕과 행복은 일치. 덕 없이 행복할 수 없고, 정의로운 영혼은 불행해질 수 없다."},

};

/* 화자표시(갑:/을:/B: …) 자동 제거 — 플라톤 단일 앱이라 라벨이 불필요 */
function speakerClean(t){
  return t
    .replace(/^\s*(갑과\s*을|갑|을|A|B|C)\s*[:：]\s*/,'')    // 콜론형: "갑:" "을:" "B:"
    .replace(/^\s*(갑과\s*을|갑|을)(은|이|도|만)\s+/,'');     // 주어형: "갑은" "을은" "갑이" …
}
function shownText(d){return d.display || speakerClean(d.text);}

/* ===== state ===== */
const LSP="plato_master_v2", LSB="plato_bm_v1", LSO="plato_obj_v1", LSA="plato_anno_v1", LSQ="plato_queue_v1";
let prog=loadJSON(LSP), BM=loadJSON(LSB), OBJ=loadArr(LSO), ANNO=loadJSON(LSA);
function loadJSON(k){try{return JSON.parse(localStorage.getItem(k))||{}}catch(e){return{}}}
function loadArr(k){try{const v=JSON.parse(localStorage.getItem(k));return Array.isArray(v)?v:[]}catch(e){return[]}}
function saveP(){localStorage.setItem(LSP,JSON.stringify(prog))}
function saveB(){localStorage.setItem(LSB,JSON.stringify(BM))}
function saveO(){localStorage.setItem(LSO,JSON.stringify(OBJ))}
function saveA(){localStorage.setItem(LSA,JSON.stringify(ANNO))}
function saveQ(){
  if(mode!=="normal")return;
  let rem=queue.slice();
  if(hi>=0&&nav[hi]&&!mastered(nav[hi].key)&&!rem.includes(nav[hi].key)) rem.unshift(nav[hi].key);  // 보고 있던 문제도 유지
  localStorage.setItem(LSQ,JSON.stringify({diff,order,queue:rem}));
}
function loadQ(){try{return JSON.parse(localStorage.getItem(LSQ))}catch(e){return null}}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function mastered(k){return !!prog[k]}
function starred(k){return !!BM[k]}

let diff="basic", order="shuffle", mode="normal";   // mode: normal | bookmark · order: shuffle | year
let pool=[], queue=[], nav=[], hi=-1, cur=null, answered=false, lastCorrect=false;
const GAP=4;

function buildPool(){ pool = diff==="hard" ? ALL.slice() : BASE.slice(); }

function restart(){    // 명시적 새 셔플
  mode="normal";
  document.getElementById("bmpill").classList.remove("on");
  buildPool();
  queue=orderedKeys();
  nav=[]; hi=-1; advanceNew();
}
function boot(){       // 로드/복귀 시 저장된 순서 이어보기(재셔플 X)
  const saved=loadQ();
  if(saved&&(saved.diff==="basic"||saved.diff==="hard")) diff=saved.diff;
  if(saved&&(saved.order==="shuffle"||saved.order==="year")) order=saved.order;
  document.querySelectorAll("#diffToggle button").forEach(x=>x.classList.toggle("on",x.dataset.d===diff));
  document.querySelectorAll("#orderToggle button").forEach(x=>x.classList.toggle("on",x.dataset.o===order));
  mode="normal";
  document.getElementById("bmpill").classList.remove("on");
  buildPool();
  let q=null;
  if(saved&&Array.isArray(saved.queue))
    q=saved.queue.filter(k=>byKey(k)&&!mastered(k)&&pool.some(d=>d.key===k));
  queue=(q&&q.length)?q:orderedKeys();
  nav=[]; hi=-1; advanceNew();
}
function startBookmark(){
  mode="bookmark";
  const keys=Object.keys(BM).filter(k=>byKey(k));
  queue=shuffle(keys.slice());
  nav=[]; hi=-1; advanceNew();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function orderedKeys(){
  const items=pool.filter(d=>!mastered(d.key));
  if(order==="year") return items.slice().sort((a,b)=>ALL.indexOf(a)-ALL.indexOf(b)).map(d=>d.key);
  return shuffle(items.map(d=>d.key));
}

function renderDone(){
  updateProgress(); saveQ();
  document.getElementById("qzone").style.display="none";
  document.getElementById("dock").style.display="none";
  document.getElementById("done").classList.add("show");

    document.getElementById("doneTitle").textContent="보관 문제 복습 완료 ⭐";
    document.getElementById("doneSub").textContent="별표는 그대로 남아 있어. 위 ⭐를 다시 누르면 일반 시험으로 돌아가.";
  }else{
    const total=pool.length;
    document.getElementById("doneTitle").textContent="플라톤 "+total+"선지 전부 정복! 🎉";
    document.getElementById("doneSub").textContent= diff==="hard"
      ? "동치 변형까지 다 맞혔어. 며칠 뒤 다시 돌려 retention을 확인해봐."
      : "이제 위 '도전'을 켜서 같은 명제를 더 어렵게 돌려봐.";
  }
}
function entryCorrect(e){const it=byKey(e.key);return e.picked&&it&&e.picked===it.ox;}
function advanceNew(){                 // 큐에서 새 문제를 뽑아 히스토리 tip에 추가
  if(hi>=0 && hi===nav.length-1){       // tip을 떠날 때: 아직 못 끝낸 건 큐로 되돌림
    const e=nav[hi], keep = mode==="bookmark" ? entryCorrect(e) : mastered(e.key);
    if(!keep){ const pos=Math.min(GAP+Math.floor(Math.random()*2), queue.length); queue.splice(pos,0,e.key); }
  }
  if(queue.length===0){ renderDone(); return; }
  nav.push({key:queue.shift(), picked:undefined});
  hi=nav.length-1;
  renderCur();
}
function goNext(){ if(hi<nav.length-1){hi++;renderCur();} else advanceNew(); }
function prev(){ if(hi>0){hi--;renderCur();} }
function updateNav(){
  const pb=document.getElementById("prevBtn");
  if(pb){pb.disabled=hi<=0; pb.style.opacity=hi<=0?.3:1;}
}
function renderCur(){                   // 현재 nav[hi] 카드 렌더(답한 카드면 피드백까지 복원)

  document.getElementById("done").classList.remove("show");

  const ctxEl=document.getElementById("qctx");

  updateNav();
  if(answered){ showFeedback(e.picked); }
  else { document.getElementById("fb").className="fb"; document.getElementById("dock").className="dock"; }
  document.getElementById("qzone").scrollTop=0;
}

function reveal(pick){            // pick: 'O' | 'X' | null(모르겠다) · 답을 nav에 기록
  if(answered)return;
  nav[hi].picked = pick;
  answered=true;
  if(pick!==null && pick===cur.ox){ prog[cur.key]=1; saveP(); }
  showFeedback(pick);
  updateProgress(); saveQ();
}
function showFeedback(pick){      // 순수 렌더 — 답한 카드로 되돌아와도 그대로 복원
  const known = pick!==null && pick!==undefined;
  const correct = known && (pick===cur.ox);
  lastCorrect = correct;
  const ax=AX[cur.axis];
  const ansL = cur.ox==="O"?"○ 옳다":"✕ 아니다";

  const fb=document.getElementById("fb");
  fb.className="fb show "+(correct?"ok":(known?"no":"dunno"));

  const res=document.getElementById("fbResult");
  res.className="fbResult "+(correct?"ok":(known?"no":"dn"));
  res.textContent = !known ? "🤔 모르겠다 — 정답 확인하고 다시 풀자" : (correct?"✅ 맞았어요!":"❌ 틀렸어요");

  let cmp="";
  if(known) cmp += `<span class="cmp ${correct?'good':'bad'}">내 선택 · ${pick==="O"?"○ 옳다":"✕ 아니다"}</span>`;
  cmp += `<span class="cmp ans">정답 · ${ansL}</span>`;
  document.getElementById("fbCompare").innerHTML=cmp;

  document.getElementById("fbConcl").textContent =
    (cur.ox==="O" ? "→ 이 선지는 플라톤의 입장이 ‘맞다’." : "→ 이 선지는 플라톤의 입장이 ‘아니다’.");

  document.getElementById("fbAx").textContent="["+cur.axis+"] "+ax.name;
  paintRegion(document.getElementById("fbWhy"),"why");
  const fForm=document.getElementById("fbForm");
  if(cur.hard){fForm.style.display="";fForm.textContent="🔁 동치형: "+cur.form+" (진리값 보존)";}
  else fForm.style.display="none";
  paintRegion(document.getElementById("fbCanon"),"canon");
  const fbSrc=document.getElementById("fbSrc");
  if(shownText(cur)!==cur.text){fbSrc.style.display="";fbSrc.textContent="원문 선지: "+cur.text;}
  else fbSrc.style.display="none";

  document.getElementById("dock").className="dock answered";
}
function answer(pick){reveal(pick);}
function dunno(){reveal(null);}
function objectQ(){
  if(!cur||answered)return;

function updateProgress(){
  const pbar=document.getElementById("pbar"), pm=document.getElementById("pmastered"), pl=document.getElementById("pleft");
  if(mode==="bookmark"){
    const total=Object.keys(BM).filter(k=>byKey(k)).length;
    const remain=new Set(queue).size;
    pbar.style.width=(total?(total-remain)/total*100:0)+"%";
    pm.textContent="⭐ 보관 복습";
    pl.textContent="남은 "+remain+" / 보관 "+total;
  }else{
    const total=pool.length, m=pool.filter(d=>mastered(d.key)).length;
    pbar.style.width=(total?m/total*100:0)+"%";
    pm.textContent="정복 "+m+"/"+total;
    pl.textContent="남은 "+queue.length+"개"+(diff==="hard"?" · 도전":"");
  }
  document.getElementById("bmCount").textContent=Object.keys(BM).length;
  document.getElementById("objCount").textContent=OBJ.length;
  document.getElementById("objpill").style.display=OBJ.length?"":"none";
  const ac=annoCount();
  document.getElementById("annoCount").textContent=ac;
  document.getElementById("annopill").style.display=ac?"":"none";
}

/* ===== 밑줄 메모·질문 (드래그 → 하이라이트 + 각주) ===== */
let pendingSel=null, selTimer=null;
function annoCount(){return Object.keys(ANNO).reduce((n,k)=>n+((ANNO[k]||[]).length),0);}
const RRANK={stem:0,why:1,canon:2}, RLABEL={stem:"선지",why:"해설",canon:"정설"};
function regionText(region){
  if(region==="why") return cur.why;
  if(region==="canon") return "플라톤 정설 — "+AX[cur.axis].canon;
  return shownText(cur);
}
function annEntries(){    // 현재 문제의 메모들을 (영역, 위치)순 정렬 + 번호 부여
  const arr=(ANNO[cur.key]||[]).map((a,i)=>({a,i,r:a.r||"stem"}));
  arr.sort((x,y)=>(RRANK[x.r]-RRANK[y.r])||(x.a.s-y.a.s));
  arr.forEach((x,k)=>x.n=k+1);
  return arr;
}
function paintRegion(el, region){
  if(!el)return;
  const txt=regionText(region);
  const es=annEntries().filter(x=>x.r===region).sort((a,b)=>a.a.s-b.a.s);
  el.innerHTML="";
  let pos=0;
  es.forEach(x=>{
    const a=x.a;
    if(a.s<pos||a.e>txt.length||a.s>=a.e)return;
    if(a.s>pos) el.appendChild(document.createTextNode(txt.slice(pos,a.s)));
    const m=document.createElement("mark"); m.className="anno"; m.dataset.n=x.n; m.textContent=txt.slice(a.s,a.e);
    m.onclick=(ev)=>{ev.stopPropagation();flashNote(x.i);};
    el.appendChild(m); pos=a.e;
  });
  if(pos<txt.length) el.appendChild(document.createTextNode(txt.slice(pos)));
}
function paintStem(){ paintRegion(document.getElementById("qstem"),"stem"); }
function paintAll(){
  paintStem();
  if(answered){ paintRegion(document.getElementById("fbWhy"),"why"); paintRegion(document.getElementById("fbCanon"),"canon"); }
}
function renderNotes(){
  const box=document.getElementById("notes"), es=annEntries();
  if(!es.length){box.style.display="none";box.innerHTML="";return;}
  box.style.display="";
  box.innerHTML="<div class='noteshd'>📝 이 문제 메모</div>"+es.map(x=>{
    const a=x.a;
    return `<div class="note" id="note${x.i}">`+
      `<span class="nn">${x.n}</span>`+
      `<span class="q">${esc(a.note)}</span>`+
      `<button class="del" onclick="delNote(${x.i})" aria-label="삭제" title="삭제">✕</button>`+
      `<span class="selq">[${RLABEL[x.r]}] “${esc(a.text)}”</span></div>`;
  }).join("");
}
function delNote(i){const l=ANNO[cur.key]; if(!l)return; l.splice(i,1); if(!l.length)delete ANNO[cur.key]; saveA(); paintAll(); renderNotes(); updateProgress();}
function flashNote(i){const n=document.getElementById("note"+i); if(!n)return; n.scrollIntoView({block:"nearest"}); n.classList.add("flash"); setTimeout(()=>n.classList.remove("flash"),900);}
function selOffsets(){
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed||sel.rangeCount===0)return null;
  let node=sel.anchorNode; const host=node&&node.nodeType===3?node.parentElement:node;
  const el=host&&host.closest?host.closest("[data-region]"):null;
  if(!el||!el.contains(sel.focusNode))return null;
  const r=sel.getRangeAt(0);
  const pre=document.createRange(); pre.setStart(el,0); pre.setEnd(r.startContainer,r.startOffset);
  const s=pre.toString().length, t=r.toString(), e=s+t.length;
  if(!t.trim())return null;
  return {r:el.dataset.region, s, e, text:t};
}
function showAddBtn(){
  const btn=document.getElementById("addnote");
  if(document.getElementById("annoOverlay").classList.contains("show")||document.getElementById("objOverlay").classList.contains("show")){btn.style.display="none";return;}
  const o=selOffsets();
  if(!o){btn.style.display="none";pendingSel=null;return;}
  const clash=(ANNO[cur.key]||[]).some(a=>(a.r||"stem")===o.r && o.s<a.e && a.s<o.e);
  const rect=window.getSelection().getRangeAt(0).getBoundingClientRect();
  btn.textContent = clash? "✕ 겹침" : "＋ 질문·메모";
  btn.dataset.clash = clash?"1":"";
  btn.style.display="block";
  let left=rect.left+rect.width/2-45; left=Math.max(8,Math.min(left, window.innerWidth-104));
  btn.style.left=left+"px";
  btn.style.top=Math.max(6, rect.top-44)+"px";
  pendingSel=o;
}
function addNote(){
  const btn=document.getElementById("addnote");
  if(btn.dataset.clash==="1"){toast("이미 메모가 있는 부분과 겹쳐요");return;}
  const o=pendingSel; if(!o)return;
  const note=prompt("이 부분에 대한 질문·메모:","");
  if(note!==null&&note.trim()){
    (ANNO[cur.key]=ANNO[cur.key]||[]).push({r:o.r,s:o.s,e:o.e,text:o.text,note:note.trim()});
    saveA(); paintAll(); renderNotes(); updateProgress(); toast("📝 메모 저장");
  }
  window.getSelection().removeAllRanges();
  btn.style.display="none"; pendingSel=null;
}
document.addEventListener("selectionchange",()=>{clearTimeout(selTimer);selTimer=setTimeout(showAddBtn,80);});
function showAnnos(){
  const items=[];
  Object.keys(ANNO).forEach(k=>{const d=byKey(k);(ANNO[k]||[]).forEach(a=>items.push({id:d?d.id:k,sym:d?d.sym:"",text:a.text,note:a.note}));});
  document.getElementById("annoN").textContent=items.length;
  document.getElementById("annoList").innerHTML= items.length? items.map(o=>
    `<div class="objitem"><div class="oi-id">${o.id} ${o.sym}</div><div class="oi-tx">“${esc(o.text)}”</div><div class="oi-note" style="color:var(--gold)">📝 ${esc(o.note)}</div></div>`).join("")
    : "<div style='color:var(--mut);font-size:13px'>아직 메모 없음</div>";
  document.getElementById("annoOverlay").classList.add("show");
}
function hideAnnos(){document.getElementById("annoOverlay").classList.remove("show");}
function copyAnnos(){
  const items=[];Object.keys(ANNO).forEach(k=>{const d=byKey(k);(ANNO[k]||[]).forEach(a=>items.push(`[${d?d.id:k} ${d?d.sym:''}] “${a.text}”\n  ? ${a.note}`));});
  if(!items.length){toast("메모 없음");return;}
  if(navigator.clipboard)navigator.clipboard.writeText(items.join("\n\n")).then(()=>toast("메모 전체 복사됨"),()=>toast("복사 실패"));
}

/* matrix */
(function(){
  const host=document.getElementById("axlist");
  Object.keys(AX).forEach(code=>{
    const sels=BASE.filter(d=>d.axis===code);
    const div=document.createElement("div");div.className="axcard";
    div.innerHTML=`<h3><span class="code">${code}</span>${AX[code].name}<span class="cnt">${sels.length}선지</span></h3>
      <div class="canon">▶ ${AX[code].canon}</div>`+
      sels.map(d=>`<div class="sel ${d.ox==='O'?'o':'x'}"><span class="b">${d.ox}</span>${d.text}<span class="id">${d.id} ${d.sym}</span></div>`).join("");
    host.appendChild(div);
  });
})();

/* equiv */
(function(){
  const host=document.getElementById("eqlist");
  HARD.forEach(h=>{
    const p=BASE.find(d=>d.key===h.parent);
    const div=document.createElement("div");div.className="eq";
    div.innerHTML=`<div class="src">[${h.axis}] ${AX[h.axis].name} · 원선지 ${p.id} ${p.sym} (정답 ${p.ox})</div>
      <div class="orig">원본: “${p.text}”</div>
      <div class="row"><span class="tag ${h.ox==='O'?'tO':'tX'}">${h.ox}</span><b>${h.form}</b> · ${h.text}</div>`;
    host.appendChild(div);
  });
  const w=document.createElement("div");w.className="eq";
  w.innerHTML=`<div class="src" style="color:var(--x)">⚠ 거짓동치 — 절대 출제 안 함</div>
    <div class="orig">원본: “각 계층이 각자 해야 할 일에 충실한 것이 정의이다.” (○)</div>
    <div class="row warn"><span class="tag tX">X</span><b>의미 전복</b> · 각 계층이 역할을 서로 교환하는 것이 정의이다.</div>
    <div class="src" style="margin-top:6px">형식만 비슷할 뿐 의미(진리값)가 뒤집힘 → 매트릭스 정설과 대조하면 걸러짐.</div>`;
  host.appendChild(w);
})();

/* ===== 키보드 / 리모컨 매핑 (걷기·트레드밀 BT 리모컨용) ===== */
document.addEventListener("keydown",e=>{
  if(document.getElementById("objOverlay").classList.contains("show"))return;
  if(!document.getElementById("loop").classList.contains("active"))return;
  if(document.getElementById("qzone").style.display==="none")return;   // 완료화면
  const k=e.key;
  if(k==="ArrowUp"||k==="PageUp"){e.preventDefault();prev();return;}        // 이전 문제
  if(k==="ArrowDown"||k==="PageDown"){e.preventDefault();goNext();return;}   // 다음 문제
  if(!answered){
    if(["ArrowLeft","o","O","1"].includes(k)){e.preventDefault();answer("O");}
    else if(["ArrowRight","x","X","2"].includes(k)){e.preventDefault();answer("X");}
    else if(["d","D","3"].includes(k)){e.preventDefault();dunno();}
    else if(["q","Q","4"].includes(k)){e.preventDefault();objectQ();}
  }else if(["Enter"," ","ArrowRight"].includes(k)){e.preventDefault();goNext();}
});

/* boot */
boot();
</script>
